<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">Start Bootstrap</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#!">About</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Shop</a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="index.html">All Products</a></li>
                            </ul>
                        </li>
                    </ul>
                    <a href="cart.html" class="btn btn-outline-dark">
                        <i class="bi-cart-fill me-1"></i>
                        Cart
                        <span class="badge bg-dark text-white ms-1 rounded-pill" id="cart-badge">0</span>
                    </a>
                </div>
            </div>
        </nav>
        <!-- Header-->
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Shop in style</h1>
                    <p class="lead fw-normal text-white-50 mb-0">With this shop hompeage template</p>
                </div>
            </div>
        </header>
        <!-- Search & Filter -->
        <section style="background:#fff; padding:2rem 0; border-bottom:2px solid #dee2e6; box-shadow:0 2px 8px rgba(0,0,0,.07);">
            <div class="container px-4 px-lg-5">
                <h5 class="text-center fw-bold mb-3" style="letter-spacing:.03em;">
                    <i class="bi-search me-2"></i>Search &amp; Filter Products
                </h5>
                <div class="row justify-content-center g-2">
                    <!-- Search input -->
                    <div class="col-12 col-sm-7 col-lg-5">
                        <div class="input-group input-group-lg">
                            <input
                                type="text"
                                id="search-input"
                                class="form-control"
                                placeholder="Search by product name..."
                                autocomplete="off"
                            />
                            <button class="btn btn-dark" id="search-btn" type="button" title="Search">
                                <i class="bi-search"></i>
                            </button>
                            <button class="btn btn-outline-secondary" id="search-clear" type="button" style="display:none;" title="Clear">
                                <i class="bi-x-lg"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Category dropdown — populated dynamically by JS -->
                    <div class="col-12 col-sm-4 col-lg-3">
                        <div class="dropdown w-100">
                            <button
                                class="btn btn-outline-dark btn-lg dropdown-toggle w-100 text-start"
                                type="button"
                                id="category-filter-btn"
                                data-bs-toggle="dropdown"
                                data-bs-flip="false"
                                aria-expanded="false">
                                All Categories
                            </button>
                            <ul class="dropdown-menu w-100"
                                id="category-filter-menu"
                                aria-labelledby="category-filter-btn"
                                style="max-height:260px; overflow-y:auto;">
                                <li>
                                    <a class="dropdown-item active" href="#" data-value="All">All Categories</a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <!-- Category items injected here by buildCategoryDropdown() -->
                            </ul>
                        </div>
                    </div>
                </div>
                <!-- Result status line -->
                <div class="row justify-content-center mt-2">
                    <div class="col-12 col-sm-11 col-lg-8 text-center">
                        <span id="search-status" class="text-muted small"></span>
                    </div>
                </div>
            </div>
        </section>
        <!-- Section-->
        <section class="py-5" id="catalog">
            <div class="container px-4 px-lg-5 mt-5">
                <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center" id="product-grid"></div>
            </div>
        </section>
        <!-- Footer-->
        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Your Website 2023</p></div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/cart-utils.js"></script>
        <script src="js/scripts.js"></script>
    </body>
</html>
