<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Register - Start Bootstrap Shop</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">Start Bootstrap</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#!">About</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Shop</a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="index.html">All Products</a></li>
                            </ul>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-2">
                        <div id="nav-auth"></div>
                        <a href="cart.html" class="btn btn-outline-dark">
                            <i class="bi-cart-fill me-1"></i>
                            Cart
                            <span class="badge bg-dark text-white ms-1 rounded-pill" id="cart-badge">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Register Form Section -->
        <section class="py-5">
            <div class="container px-4 px-lg-5">
                <div class="row justify-content-center">
                    <div class="col-md-5">

                        <div class="card shadow-sm border-0">
                            <div class="card-body p-4 p-md-5">

                                <h2 class="fw-bolder mb-1 text-center">Create account</h2>
                                <p class="text-muted text-center mb-4">Join us today</p>

                                <!-- Error alert — hidden until something fails -->
                                <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

                                <form id="register-form" novalidate>

                                    <!-- First name -->
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold" for="first-name">First name</label>
                                        <input
                                            class="form-control"
                                            type="text"
                                            id="first-name"
                                            placeholder="Alice"
                                            required
                                            autocomplete="given-name"
                                        />
                                    </div>

                                    <!-- Email -->
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold" for="email">Email address</label>
                                        <input
                                            class="form-control"
                                            type="email"
                                            id="email"
                                            placeholder="you@example.com"
                                            required
                                            autocomplete="email"
                                        />
                                    </div>

                                    <!-- Password with show/hide toggle -->
                                    <div class="mb-2">
                                        <label class="form-label fw-semibold" for="password">Password</label>
                                        <div class="input-group">
                                            <input
                                                class="form-control"
                                                type="password"
                                                id="password"
                                                placeholder="Create a password"
                                                required
                                                autocomplete="new-password"
                                            />
                                            <button class="btn btn-outline-secondary" type="button" id="toggle-password" aria-label="Toggle password visibility">
                                                <i class="bi-eye" id="toggle-icon"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <!-- Live password rule checklist -->
                                    <!-- Each item is updated by validatePassword() as the user types -->
                                    <ul class="list-unstyled small mb-3 ps-1">
                                        <li id="rule-length" class="text-danger">
                                            <i class="bi-x-circle-fill me-1"></i>At least 8 characters
                                        </li>
                                        <li id="rule-uppercase" class="text-danger">
                                            <i class="bi-x-circle-fill me-1"></i>At least one uppercase letter
                                        </li>
                                        <li id="rule-special" class="text-danger">
                                            <i class="bi-x-circle-fill me-1"></i>At least one special character (!@#$%^&amp;*)
                                        </li>
                                    </ul>

                                    <!-- Confirm password -->
                                    <div class="mb-2">
                                        <label class="form-label fw-semibold" for="confirm-password">Confirm password</label>
                                        <input
                                            class="form-control"
                                            type="password"
                                            id="confirm-password"
                                            placeholder="Re-enter your password"
                                            required
                                            autocomplete="new-password"
                                        />
                                    </div>

                                    <!-- Passwords match indicator -->
                                    <ul class="list-unstyled small mb-4 ps-1">
                                        <li id="rule-match" class="text-muted">
                                            <i class="bi-circle me-1"></i>Passwords match
                                        </li>
                                    </ul>

                                    <!-- Submit -->
                                    <div class="d-grid">
                                        <button class="btn btn-dark btn-lg" type="submit" id="register-btn">
                                            <span class="spinner-border spinner-border-sm me-2 d-none" id="btn-spinner" role="status" aria-hidden="true"></span>
                                            <span id="btn-text">Create account</span>
                                        </button>
                                    </div>

                                </form>

                                <!-- Link to login -->
                                <p class="text-center text-muted small mt-4 mb-0">
                                    Already have an account? <a href="login.html">Sign in</a>
                                </p>

                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-5 bg-dark">
            <div class="container">
                <p class="m-0 text-center text-white">Copyright &copy; Your Website 2023</p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/cart-utils.js"></script>
        <script src="js/register.js"></script>
    </body>
</html>
